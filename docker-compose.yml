services:
  # --- BASE DE DATOS (PostgreSQL v16) ---
  db:
    image: postgres:16
    container_name: resto_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root          
      POSTGRES_DB: mesonMarinero       
    ports:
      - "5433:5432"                    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resto-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BACKEND (API) ---
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: resto_backend
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgres://postgres:root@db:5432/mesonMarinero
      PORT: 4000
      NODE_ENV: development
      TZ: Europe/Madrid
    depends_on:
      db:
        condition: service_healthy
    networks:
      - resto-network

  # --- FRONTEND (WEB) - Development Mode ---
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: resto_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4000/api
      - BACKEND_URL=http://backend:4000
    depends_on:
      - backend
    networks:
      - resto-network
    stdin_open: true
    tty: true

  # --- GESTOR VISUAL DB (pgAdmin) ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: resto_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - resto-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  resto-network:
    driver: bridge