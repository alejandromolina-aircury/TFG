services:
  # --- BASE DE DATOS (PostgreSQL v16) ---
  db:
    image: postgres:16
    container_name: resto_db_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: mesonMarinero
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - resto-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BACKEND (API) ---
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: resto_backend_prod
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-root}@db:5432/mesonMarinero
      PORT: 4000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - resto-network
    restart: unless-stopped

  # --- FRONTEND (WEB) - Production Mode ---
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resto_frontend_prod
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - backend
    networks:
      - resto-network
    restart: unless-stopped

  # --- GESTOR VISUAL DB (pgAdmin) - Optional en producción ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: resto_pgadmin_prod
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-root}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - resto-network
    volumes:
      - pgadmin_data_prod:/var/lib/pgadmin
    profiles:
      - tools  # Solo se inicia si se especifica: docker-compose --profile tools up

volumes:
  postgres_data_prod:
  pgadmin_data_prod:

networks:
  resto-network:
    driver: bridge